<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="none" stroke="rgba(99,102,241,0.3)" stroke-width="1.5"/>
  
  <!-- Store Bag Handle -->
  <path d="M 46 48 L 46 36 C 46 26 54 20 64 20 C 74 20 82 26 82 36 L 82 48" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Store Bag Body -->
  <path d="M 32 48 L 96 48 C 100 48 104 52 104 56 L 100 96 C 99 104 92 108 84 108 L 44 108 C 36 108 29 104 28 96 L 24 56 C 24 52 28 48 32 48 Z" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Content inside bag - V letter for VAXP -->
  <path d="M 50 65 L 64 85 L 78 65" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow effect -->
  <circle cx="64" cy="80" r="30" fill="url(#glow)"/>
</svg>
